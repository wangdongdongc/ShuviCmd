name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build for arm64
        run: swift build -c release --arch arm64

      - name: Build for x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            .build/arm64-apple-macosx/release/shuvi \
            .build/x86_64-apple-macosx/release/shuvi \
            -output dist/shuvi
          chmod +x dist/shuvi
          strip dist/shuvi

      - name: Package archive
        run: |
          cd dist
          tar czf shuvi-${{ github.ref_name }}-macos-universal.tar.gz shuvi
          shasum -a 256 shuvi-${{ github.ref_name }}-macos-universal.tar.gz > sha256.txt
          cat sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/shuvi-${{ github.ref_name }}-macos-universal.tar.gz
            dist/sha256.txt

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          SHA256=$(awk '{print $1}' dist/sha256.txt)
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_URL="https://github.com/wangdongdongc/ShuviCmd/releases/download/v${VERSION}/shuvi-v${VERSION}-macos-universal.tar.gz"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/wangdongdongc/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          printf 'class Shuvi < Formula\n  desc "macOS CLI AI agent that executes bash commands via natural language"\n  homepage "https://github.com/wangdongdongc/ShuviCmd"\n  version "%s"\n  license "MIT"\n\n  url "%s"\n  sha256 "%s"\n\n  depends_on :macos\n\n  def install\n    bin.install "shuvi"\n  end\n\n  test do\n    assert_match "usage", shell_output("#{bin}/shuvi --help", 0).downcase\n  end\nend\n' \
            "$VERSION" "$ARCHIVE_URL" "$SHA256" > Formula/shuvi.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shuvi.rb
          git commit -m "Update shuvi to ${VERSION}"
          git push
